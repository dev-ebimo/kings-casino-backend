<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Casino - Entry Gateway</title>
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <h1>King's Vault</h1>
        <!--The <form> tag allows users to submit their credentials just by pressing the "Enter" key on their keyboard, and it unlocks native HTML validation rules-->
        <form id="signup-form" class="auth-form">
            <h2>Create Account</h2>
            <input type="text" id="signup-username" name="username" placeholder="Choose Username" required autocomplete="username">
            <!--The required property ensures that a user cannot submit empty text boxes to our backend-->
        <div class="password-wrapper">
            <input type="password" id="signup-password" name="password" placeholder="Create Password" required autocomplete="new-password">
            <span class="toggle-password" id="toggle-signup-pass">Show</span>
        </div>
            <button type="submit">Register & Claim ₦100</button>
            <p id="signup-message" class="message"></p>
        </form>
        <div class="divider">OR</div>
        <form id="login-form" class="auth-form">
            <h2>Player Login</h2>
            <input type="text" id="login-username" name="username" placeholder="Username" required autocomplete="username">
        <div class="password-wrapper">
            <input type="password" id="login-password" name="password" placeholder="Password" required autocomplete="current-password">
            <span class="toggle-password" id="toggle-login-pass">Show</span>
        </div>
            <button type="submit" class="btn-secondary" id="submit">Enter Casino</button>
            <p id="login-message" class="message"></p>
        </form>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
